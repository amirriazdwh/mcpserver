services:
  postgres:
    image: postgres:15
    container_name: hive-metastore-db
    environment:
      POSTGRES_DB: metastore_db
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: password
    volumes:
      - hive-db-data:/var/lib/postgresql/data
    networks:
      - hive_net

  hive-metastore:
    image: apache/hive:4.0.0
    container_name: hive-metastore
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      SERVICE_OPTS: "-Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://postgres:5432/metastore_db -Djavax.jdo.option.ConnectionUserName=hive -Djavax.jdo.option.ConnectionPassword=password"
    depends_on:
      - postgres
    ports:
      - "9083:9083"
    volumes:
      - ./postgresql.jar:/opt/hive/lib/postgresql.jar
    networks:
      - hive_net

  hive-server:
    image: apache/hive:4.0.0
    container_name: hive-server
    entrypoint: |
      sh -c '
        export HIVE_CONF_DIR=/opt/hive/conf
        export HADOOP_CLIENT_OPTS="-Xmx2G -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://postgres:5432/metastore_db -Djavax.jdo.option.ConnectionUserName=hive -Djavax.jdo.option.ConnectionPassword=password"
        exec /opt/hive/bin/hive --skiphadoopversion --skiphbasecp --service hiveserver2
      '
    environment:
      DB_DRIVER: postgres
      SERVICE_NAME: hiveserver2
    depends_on:
      - hive-metastore
    ports:
      - "10000:10000"
      - "10002:10002"
    volumes:
      - ./hive-site.xml:/opt/hive/conf/hive-site.xml:ro
      - ./postgresql.jar:/opt/hive/lib/postgresql.jar
    networks:
      - hive_net

volumes:
  hive-db-data:

networks:
  hive_net:
    driver: bridge
